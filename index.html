        <img id="chrome-badge" src="https://img.shields.io/badge/Chrome-Version-grey" alt="Chrome Version Badge">

            <script>
                // Function to get Chrome version from the user agent string
                function getChromeVersion() {
                    var userAgent = navigator.userAgent;
                    var chromeIndex = userAgent.indexOf("Chrome/");
                    if (chromeIndex > -1) {
                        var chromeVersion = userAgent.substring(chromeIndex + 7);
                        chromeVersion = chromeVersion.split(" ")[0]; // Extract just the version number
                        return parseFloat(chromeVersion); // Return version as a number
                    }
                    return null;
                }

                // Update the badge with Chrome version
                var chromeVersion = getChromeVersion();
                if (chromeVersion) {
                    // If version is less than 137, show "Chrome" in red, else show "Chrome" in green
                    var label = chromeVersion < 137 ? "Update_Chrome" : "Chrome";
                    var color = chromeVersion < 137 ? "red" : "brightgreen?style=for-the-badge&logo=googlechrome&logoColor=f5f5f5"; // Set color based on version
                    var badgeUrl = `https://img.shields.io/badge/${label}-${chromeVersion}-${color}`;
                    document.getElementById("chrome-badge").src = badgeUrl;
                } else {
                    document.getElementById("chrome-badge").src = "https://img.shields.io/badge/Browser-Not_Chrome-red";
                }
            </script>
